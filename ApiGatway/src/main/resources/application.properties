spring.application.name=APIGATEWAY

spring.config.import=optional:configserver:http://localhost:8888

server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=AUTHSERVICE
spring.cloud.gateway.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=CUSTOMERSERVICE
spring.cloud.gateway.routes[1].uri=lb://CUSTOMERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/customers/**

spring.cloud.gateway.routes[2].id=ACCOUNTSERVICE
spring.cloud.gateway.routes[2].uri=lb://ACCOUNTSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/accounts/**

spring.cloud.gateway.routes[3].id=TRANSACTIONSERVICE
spring.cloud.gateway.routes[3].uri=lb://TRANSACTIONSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/transactions/**

spring.cloud.gateway.routes[4].id=BENEFICIARYSERVICE
spring.cloud.gateway.routes[4].uri=lb://BENEFICIARYSERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/beneficiaries/**

spring.cloud.gateway.routes[5].id=LOANSERVICE
spring.cloud.gateway.routes[5].uri=lb://LOANSERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/loans/**

spring.cloud.gateway.routes[6].id=NOTIFICATIONSERVICE
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging for debugging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
